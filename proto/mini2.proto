syntax = "proto3";

package mini2;

enum QueryType {
  ZIP_RANGE  = 0;
  DATE_RANGE = 1;
  BBOX       = 2;
}

message ServiceRecord {
  uint64 unique_key              = 1;
  uint32 created_date            = 2;
  uint32 incident_zip            = 3;
  float  latitude                = 4;
  float  longitude               = 5;
  uint32 closed_date             = 6;
  uint32 due_date                = 7;
  uint32 resolution_updated_date = 8;
  uint64 bbl                     = 9;
  uint32 community_board         = 10;
  uint32 council_district        = 11;
  uint32 police_precinct         = 12;
  int32  x_coord                 = 13;
  int32  y_coord                 = 14;
  string agency                  = 15;
  string agency_name             = 16;
  string complaint_type          = 17;
  string complaint_detail        = 18;
  string location_type           = 19;
  string address_type            = 20;
  string facility_type           = 21;
  string status                  = 22;
  string open_data_channel       = 23;
  string borough_name            = 24;
  string park_borough            = 25;
  string additional_details      = 26;
  string incident_address        = 27;
  string street_name             = 28;
  string cross_street_1          = 29;
  string cross_street_2          = 30;
  string intersect_street_1      = 31;
  string intersect_street_2      = 32;
  string city                    = 33;
  string landmark                = 34;
  string resolution_desc         = 35;
  string park_facility           = 36;
  string vehicle_type            = 37;
  string taxi_company_borough    = 38;
  string taxi_pickup             = 39;
  string bridge_hwy_name         = 40;
  string bridge_hwy_dir          = 41;
  string road_ramp               = 42;
  string bridge_hwy_seg          = 43;
  string location                = 44;
}

message Query {
  string    request_id = 1;
  QueryType type       = 2;
  uint32    zip_min    = 3;
  uint32    zip_max    = 4;
  uint32    date_min   = 5;
  uint32    date_max   = 6;
  double    lat_min    = 7;
  double    lat_max    = 8;
  double    lon_min    = 9;
  double    lon_max    = 10;
}

message SubmitResponse {
  string request_id = 1;
}

message FetchRequest {
  string request_id = 1;
  int32  chunk_idx  = 2;
  int32  chunk_size = 3;
}

message FetchResponse {
  string                 request_id = 1;
  int32                  chunk_idx  = 2;
  repeated ServiceRecord records    = 3;
  bool                   is_last    = 4;
}

message ForwardResponse {
  repeated ServiceRecord records = 1;
}

message CancelRequest {
  string request_id = 1;
}

message CancelResponse {}

service NodeService {
  rpc Submit  (Query)         returns (SubmitResponse);
  rpc Fetch   (FetchRequest)  returns (FetchResponse);
  rpc Forward (Query)         returns (ForwardResponse);
  rpc Cancel  (CancelRequest) returns (CancelResponse);
}